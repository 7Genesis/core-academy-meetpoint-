name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Build and Prisma Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run frontend:build
      - run: npx prisma validate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/meetpoint_ci?schema=public
