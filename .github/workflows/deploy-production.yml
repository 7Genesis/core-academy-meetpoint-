name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: Production version or tag
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-artifacts:
    name: Build Production Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run frontend:build

      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist-production
          path: dist

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-production
          path: frontend/dist

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-artifacts
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DEPLOY_WEBHOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply database migrations and RLS
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PRODUCTION_DATABASE_URL not configured. Skipping database migration."
            exit 0
          fi

          npx prisma migrate deploy
          npx prisma db execute --schema prisma/schema.prisma --file prisma/rls.sql

      - name: Trigger production deploy webhook
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "PRODUCTION_DEPLOY_WEBHOOK_URL not configured. Build artifacts are ready, deploy skipped."
            exit 0
          fi

          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"environment\":\"production\",\"sha\":\"${GITHUB_SHA}\"}"
