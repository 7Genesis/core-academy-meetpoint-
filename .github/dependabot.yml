version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    groups:
      nest-and-api:
        patterns:
          - "@nestjs/*"
          - "@prisma/*"
          - "prisma"
      frontend:
        patterns:
          - "react"
          - "react-dom"
          - "vite"
          - "@vitejs/*"
