services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetpoint
      POSTGRES_USER: meetpoint
      POSTGRES_PASSWORD: meetpoint-local-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetpoint -d meetpoint"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://meetpoint:meetpoint-local-password@postgres:5432/meetpoint?schema=public
      JWT_SECRET: replace-with-local-32-character-secret
      PII_ENCRYPTION_KEY: replace-with-local-32-byte-key
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://127.0.0.1:5173,http://localhost:5173
      COOKIE_SECURE: "false"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
