title = "Core Academy Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Allow only historical non-secret placeholders that existed in env examples"
condition = "AND"
regexTarget = "line"
paths = [
  '''^\.env\.example$''',
]
regexes = [
  '''JWT_PRIVATE_KEY="-----BEGIN PRIVATE KEY-----\\nCHANGE_ME\\n-----END PRIVATE KEY-----"''',
  '''JWT_PUBLIC_KEY="-----BEGIN PUBLIC KEY-----\\nCHANGE_ME\\n-----END PUBLIC KEY-----"''',
  '''WEBHOOK_SECRET="change-webhook-secret"''',
  '''STRIPE_SECRET_KEY="sk_test_change_me"''',
  '''STRIPE_WEBHOOK_SECRET="whsec_change_me"''',
]

[[allowlists]]
description = "Allow documentation references to redacted webhook token patterns"
condition = "AND"
regexTarget = "line"
paths = [
  '''^docs/security-hardening\.md$''',
]
regexes = [
  '''`whsec_\*`''',
]
