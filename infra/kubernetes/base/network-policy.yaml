apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: meetpoint-api
  namespace: meetpoint
spec:
  podSelector:
    matchLabels:
      app: meetpoint-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - {}
