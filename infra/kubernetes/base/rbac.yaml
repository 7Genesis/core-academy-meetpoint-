apiVersion: v1
kind: ServiceAccount
metadata:
  name: meetpoint-api
  namespace: meetpoint
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: meetpoint-api
  namespace: meetpoint
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meetpoint-api
  namespace: meetpoint
subjects:
  - kind: ServiceAccount
    name: meetpoint-api
    namespace: meetpoint
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: meetpoint-api
